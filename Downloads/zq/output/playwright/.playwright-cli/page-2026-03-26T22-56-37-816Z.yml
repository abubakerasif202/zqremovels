          - article [ref=e77]:
            - generic [ref=e78]: Option 01
            - heading "Targeted Fragile Packing" [level=3] [ref=e79]
            - paragraph [ref=e80]: Best when you can handle the basics yourself but want premium protection for the items most likely to break or scratch.
            - list [ref=e81]:
