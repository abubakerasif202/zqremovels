            - heading "Custom Protection for Fragile and High-Value Pieces" [level=3] [ref=e64]
            - paragraph [ref=e65]: Art, mirrors, antiques, and unusually shaped pieces need a more deliberate packing standard so they can travel with less risk.
            - list [ref=e66]:
              - listitem [ref=e67]: Custom crating for artwork when required
              - listitem [ref=e68]: Mirror and glass panel reinforcement
              - listitem [ref=e69]: Soft-wrap layers for delicate finishes
