          - heading "The quote is scoped before the truck is booked." [level=2] [ref=e92]
          - paragraph [ref=e93]: The contact form is the starting point. Once the brief is clear, the team can review the route, access, and handling requirements properly instead of filling gaps on moving day.
        - generic [ref=e94]:
          - article [ref=e95]:
            - generic [ref=e96]: "01"
            - heading "Send the route and inventory brief" [level=3] [ref=e97]
            - paragraph [ref=e98]: Start with both suburbs, the preferred date, the property type, and a realistic view of how much is moving.
          - article [ref=e99]:
            - generic [ref=e100]: "02"
            - heading "Access and handling notes are reviewed" [level=3] [ref=e101]
            - paragraph [ref=e102]: Stairs, lifts, dock bookings, parking limits, bulky items, and fragile pieces are the details that change labour and timing.
          - article [ref=e103]:
            - generic [ref=e104]: "03"
            - heading "The move is scoped with fewer assumptions" [level=3] [ref=e105]
            - paragraph [ref=e106]: Once the brief is usable, the quote can reflect the real route and service requirements rather than a loose headline estimate.
