          - heading "The details that make the first reply more useful." [level=2] [ref=e111]
          - paragraph [ref=e112]: If you want the quote conversation to move faster, these are the pieces of information worth adding to the first brief.
        - generic [ref=e113]:
          - article [ref=e114]:
            - generic [ref=e115]: Route
            - heading "Pickup suburb, destination, and preferred date" [level=3] [ref=e116]
            - paragraph [ref=e117]: The route and the timing window are the baseline for every local, interstate, office, and packing-heavy move.
          - article [ref=e118]:
            - generic [ref=e119]: Access
            - heading "Stairs, lifts, parking, docks, and loading distance" [level=3] [ref=e120]
            - paragraph [ref=e121]: These details affect how long the move takes and what needs to be planned before the vehicle arrives.
          - article [ref=e122]:
            - generic [ref=e123]: Handling
            - heading "Heavy, fragile, or high-value items that need more care" [level=3] [ref=e124]
            - paragraph [ref=e125]: Flag anything oversized, delicate, or commercially sensitive so the quote can reflect the right protection and sequencing.
    - region "Common questions before sending the enquiry." [ref=e126]:
      - generic [ref=e127]:
        - generic [ref=e128]:
          - generic [ref=e129]: Quote FAQ
          - heading "Common questions before sending the enquiry." [level=2] [ref=e130]
          - paragraph [ref=e131]: These answers cover the practical details people usually want to clarify before they commit to the quote form.
        - generic [ref=e132]:
          - article [ref=e133]:
            - heading "Can I use the same form for local, interstate, office, and packing jobs?" [level=3] [ref=e134]
            - paragraph [ref=e136]: Yes. Use the move type field to identify the job and then add the route, timing, access, and special handling notes in the details box.
          - article [ref=e137]:
            - heading "What if I do not know every detail yet?" [level=3] [ref=e138]
            - paragraph [ref=e140]: Send what you know now, especially the suburbs, date window, and rough inventory. The team can clarify the remaining access or handling details before the quote is finalised.
          - article [ref=e141]:
            - heading "Should I call instead of using the form?" [level=3] [ref=e142]
            - paragraph [ref=e144]: Call if the move is urgent, access is unusually complex, or the route still needs discussion. Use the form when you want the job details captured in one place first.
