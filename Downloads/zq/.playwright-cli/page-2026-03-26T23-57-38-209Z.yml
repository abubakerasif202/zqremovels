        - generic [ref=e139]:
          - article [ref=e140]:
            - heading "Can I use the same form for local, interstate, office, and packing jobs?" [level=3] [ref=e141]
            - paragraph [ref=e143]: Yes. Use the move type field to identify the job and then add the route, timing, access, and special handling notes in the details box.
          - article [ref=e144]:
            - heading "What if I do not know every detail yet?" [level=3] [ref=e145]
            - paragraph [ref=e147]: Send what you know now, especially the suburbs, date window, and rough inventory. The team can clarify the remaining access or handling details before the quote is finalised.
          - article [ref=e148]:
            - heading "Should I call instead of using the form?" [level=3] [ref=e149]
            - paragraph [ref=e151]: Call if the move is urgent, access is unusually complex, or the route still needs discussion. Use the form when you want the job details captured in one place first.
